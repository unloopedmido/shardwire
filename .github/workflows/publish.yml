name: Publish

on:
  push:
    branches:
      - main
      - master
    paths:
      - package.json

concurrency:
  group: npm-publish-package-json
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          fetch-tags: true

      - name: Detect version bump
        id: meta
        run: |
          set -euo pipefail
          NEW=$(node -p "require('./package.json').version")
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "No parent commit; skipping."
            exit 0
          fi
          OLD=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version")
          if [ "$OLD" = "$NEW" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "package.json version unchanged ($NEW); skipping."
            exit 0
          fi
          TAG="v${NEW}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists on remote; skipping."
            exit 0
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.meta.outputs.publish == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.meta.outputs.publish == 'true'
        run: npm ci

      - name: Run verification
        if: steps.meta.outputs.publish == 'true'
        run: npm run verify

      - name: Check changelog release notes
        if: steps.meta.outputs.publish == 'true'
        run: node scripts/check-changelog-release.mjs

      - name: Push version tag
        if: steps.meta.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "refs/tags/${{ steps.meta.outputs.tag }}"

      - name: Publish to npm
        if: steps.meta.outputs.publish == 'true'
        run: npm publish --provenance --access public
